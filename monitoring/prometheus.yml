# Prometheus 配置 - ADK Middleware 监控
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'adk-internal'
    environment: 'production'

scrape_configs:
  # ADK Middleware 服务监控
  - job_name: 'adk-middleware'
    static_configs:
      - targets:
          - 'adk-middleware:8000'
        labels:
          service: 'adk-middleware'
          team: 'drl'

  # Traefik 监控
  - job_name: 'traefik'
    static_configs:
      - targets:
          - 'traefik:8080'
        labels:
          service: 'traefik'

  # Redis 监控（如果启用）
  - job_name: 'redis'
    static_configs:
      - targets:
          - 'redis:6379'
        labels:
          service: 'redis'
    metrics_path: /metrics
    params:
      target: ['redis://redis:6379']
