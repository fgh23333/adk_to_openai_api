# ========================================
# GitLab CI 配置 - ADK Middleware 内网部署
# ========================================
# 使用说明：标记为 【TODO】 的地方需要根据实际项目修改

variables:
  PROJECT_NAME: "adk-middleware"  # 【TODO】项目名称
  REPO_URL: "ssh://git@gitlab.flashhold.com:10022/drl/mcp/adk_to_openai_api.git"  # 【TODO】Git仓库地址

stages:
  - deploy

# ========================================
# 部署模板（无需修改）
# ========================================
.deploy_template: &deploy_logic
  stage: deploy
  before_script:
    - apt-get update -qq && apt-get install -y openssh-client sshpass
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" "
        # 环境变量（从CI传入，使用双引号让变量在本地展开）
        export HOST_PORT=\"$DEPLOY_PORT\"
        export HOST_DATA_PATH=\"$DATA_PATH\"
        export CONTAINER_NAME=\"$CONTAINER_NAME\"
        export URL_PREFIX=\"$URL_PREFIX\"
        export PROJECT_NAME=\"$PROJECT_NAME\"
        export SSH_HOST=\"$SSH_HOST\"

        # 内网 ADK 后端配置
        export ADK_BACKEND_URL=\"$ADK_BACKEND_URL\"
        export ADK_APP_NAME=\"${ADK_APP_NAME:-default_agent}\"
        export ADK_BACKEND_MAPPING=\"$ADK_BACKEND_MAPPING\"
        export ENABLE_API_KEY_AUTH=\"${ENABLE_API_KEY_AUTH:-true}\"
        export API_KEY=\"$API_KEY\"

        # 创建数据目录
        mkdir -p $DATA_PATH

        # 拉取代码
        if [ ! -d $CODE_PATH ]; then
          # 代码目录不存在，创建并克隆
          mkdir -p $CODE_PATH
          git clone --branch $CI_COMMIT_REF_NAME $REPO_URL $CODE_PATH
        else
          # 目录已存在，进入目录
          cd $CODE_PATH
          if [ ! -d .git ]; then
            # 目录存在但不是git仓库，报错退出
            echo '错误: \$CODE_PATH 目录已存在且不是git仓库，请手动检查'
            exit 1
          fi
          # 已有git仓库，拉取更新
          git fetch origin
          git checkout -B $CI_COMMIT_REF_NAME origin/$CI_COMMIT_REF_NAME
          git reset --hard origin/$CI_COMMIT_REF_NAME
        fi

        cd $CODE_PATH

        # 确保 web_gateway 网络存在
        docker network ls | grep web_gateway || docker network create web_gateway

        # 启动容器
        docker compose -p $CONTAINER_NAME up -d --build --force-recreate

        # 健康检查（等待容器启动完成）
        echo '等待服务启动...'
        sleep 10
        docker exec $CONTAINER_NAME curl -f http://localhost:8000/v1/health || exit 1

        echo ''
        echo '================================================'
        echo '🚀 部署成功！'
        echo '📖 API: http://$SSH_HOST:$DEPLOY_PORT$URL_PREFIX/v1/chat/completions'
        echo '📖 Swagger: http://$SSH_HOST:$DEPLOY_PORT$URL_PREFIX/docs'
        echo '💾 数据目录: $DATA_PATH'
        echo '================================================'
      "

# ========================================
# 预览环境 (internal-deploy 分支)
# ========================================
deploy_preview:
  <<: *deploy_logic
  variables:
    DEPLOY_PORT: "9601"           # 【TODO】预览环境端口
    URL_PREFIX: "/adk-dev"        # 【TODO】预览环境路由前缀
    CONTAINER_NAME: "adk-middleware-dev" # 【TODO】预览环境容器名
    CODE_PATH: "/home/projects/adk_middleware_dev"        # 【TODO】代码存放路径
    DATA_PATH: "/home/projects/adk_middleware_data/dev"   # 【TODO】数据存储路径
    # 【TODO】预览环境 ADK 后端地址
    ADK_BACKEND_URL: "http://adk-backend-dev.internal.local:8080"
  only:
    - internal-deploy

# ========================================
# 生产环境 (master 分支)
# ========================================
deploy_production:
  <<: *deploy_logic
  variables:
    DEPLOY_PORT: "9600"           # 【TODO】生产环境端口
    URL_PREFIX: "/adk"            # 【TODO】生产环境路由前缀
    CONTAINER_NAME: "adk-middleware-prod" # 【TODO】生产环境容器名
    CODE_PATH: "/home/projects/adk_middleware_prod"       # 【TODO】代码存放路径
    DATA_PATH: "/home/projects/adk_middleware_data/prod"  # 【TODO】数据存储路径
    # 【TODO】生产环境 ADK 后端地址
    ADK_BACKEND_URL: "http://adk-backend-prod.internal.local:8080"
  only:
    - master

# ========================================
# GitLab 变量配置（在 GitLab 项目设置中配置）
# ========================================
# 必填变量：
# SSH_HOST      - 部署目标服务器 IP (如: 192.168.1.100)
# SSH_USER      - SSH 登录用户名 (如: root)
# SSH_PASSWORD  - SSH 登录密码（勾选 Masked）
#
# 可选变量：
# API_KEY       - API 认证密钥 (如: sk-internal:xxxxx)
# ADK_APP_NAME  - ADK 应用名称 (默认: default_agent)
# ENABLE_API_KEY_AUTH - 是否启用API Key认证 (默认: true)
