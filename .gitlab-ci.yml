# ========================================
# GitLab CI 配置 - ADK Middleware 内网部署
# ========================================

variables:
  PROJECT_NAME: "adk-middleware"
  REPO_URL: "ssh://git@gitlab.flashhold.com:10022/drl/mcp/adk_to_openai_api.git"

stages:
  - deploy

# ========================================
# 部署模板（无需修改）
# ========================================
.deploy_template: &deploy_logic
  stage: deploy
  before_script:
    - apt-get update -qq && apt-get install -y openssh-client sshpass
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" "
        # 环境变量（从CI传入）
        export HOST_PORT=\"$DEPLOY_PORT\"
        export HOST_DATA_PATH=\"$DATA_PATH\"
        export CONTAINER_NAME=\"$CONTAINER_NAME\"
        export URL_PREFIX=\"$URL_PREFIX\"
        export PROJECT_NAME=\"$PROJECT_NAME\"
        export SSH_HOST=\"$SSH_HOST\"

        # ADK 后端配置（必填）
        export ADK_BACKEND_MAPPING=\"$ADK_BACKEND_MAPPING\"
        export ADK_TIMEOUT=\"${ADK_TIMEOUT:-120000}\"
        export ADK_CONNECT_TIMEOUT=\"${ADK_CONNECT_TIMEOUT:-30000}\"

        # 认证配置
        export ENABLE_API_KEY_AUTH=\"${ENABLE_API_KEY_AUTH:-false}\"
        export API_KEY=\"$API_KEY\"

        # 创建数据目录
        mkdir -p $DATA_PATH

        # 拉取代码
        if [ ! -d $CODE_PATH ]; then
          mkdir -p $CODE_PATH
          git clone --branch $CI_COMMIT_REF_NAME $REPO_URL $CODE_PATH
        else
          cd $CODE_PATH
          if [ ! -d .git ]; then
            echo '错误: \$CODE_PATH 目录已存在且不是git仓库'
            exit 1
          fi
          git fetch origin
          git checkout -B $CI_COMMIT_REF_NAME origin/$CI_COMMIT_REF_NAME
          git reset --hard origin/$CI_COMMIT_REF_NAME
        fi

        cd $CODE_PATH

        # 确保 web_gateway 网络存在
        docker network ls | grep web_gateway || docker network create web_gateway

        # 启动容器
        docker compose -p $CONTAINER_NAME up -d --build --force-recreate

        # 健康检查
        echo '等待服务启动...'
        sleep 10
        docker exec $CONTAINER_NAME curl -f http://localhost:8000/health || exit 1

        echo ''
        echo '================================================'
        echo '🚀 部署成功！'
        echo '📖 API: http://'$SSH_HOST:$DEPLOY_PORT$URL_PREFIX'/v1/chat/completions'
        echo '📖 Swagger: http://'$SSH_HOST:$DEPLOY_PORT$URL_PREFIX'/docs'
        echo '💾 数据目录: $DATA_PATH'
        echo '================================================'
      "

# ========================================
# 预览环境 (internal-deploy 分支)
# ========================================
deploy_preview:
  <<: *deploy_logic
  variables:
    DEPLOY_PORT: "9601"
    URL_PREFIX: "/adk-dev"
    CONTAINER_NAME: "adk-middleware-dev"
    CODE_PATH: "/home/projects/adk_middleware_dev"
    DATA_PATH: "/home/projects/adk_middleware_data/dev"
    # 【必填】预览环境 ADK 后端映射（应用名:地址）
    ADK_BACKEND_MAPPING: "data-analysis:http://172.31.243.14:8000"
  only:
    - internal-deploy

# ========================================
# 生产环境 (master 分支)
# ========================================
deploy_production:
  <<: *deploy_logic
  variables:
    DEPLOY_PORT: "9600"
    URL_PREFIX: "/adk"
    CONTAINER_NAME: "adk-middleware-prod"
    CODE_PATH: "/home/projects/adk_middleware_prod"
    DATA_PATH: "/home/projects/adk_middleware_data/prod"
    # 【必填】生产环境 ADK 后端映射（应用名:地址）
    ADK_BACKEND_MAPPING: "data-analysis:http://172.31.243.14:8000"
  only:
    - master

# ========================================
# GitLab 变量配置（在 GitLab 项目设置中配置）
# ========================================
# 必填变量：
# ADK_BACKEND_MAPPING - ADK 后端映射（必填），格式: app1:http://xxx:8000,app2:http://yyy:8000
# SSH_HOST            - 部署目标服务器 IP
# SSH_USER            - SSH 登录用户名
# SSH_PASSWORD        - SSH 登录密码（勾选 Masked）
#
# 可选变量：
# API_KEY             - API 认证密钥
# ENABLE_API_KEY_AUTH - 是否启用API Key认证 (默认: false)
